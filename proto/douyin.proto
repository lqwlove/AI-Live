syntax = "proto3";

package douyin;

message Response {
  repeated Message messages_list = 1;
  string cursor = 2;
  uint64 fetch_interval = 3;
  uint64 now = 4;
  string internal_ext = 5;
  uint32 fetch_type = 6;
  map<string, string> route_params = 7;
  uint64 heartbeat_duration = 8;
  bool need_ack = 9;
  string push_server = 10;
  string live_cursor = 11;
  bool history_no_more = 12;
}

message Message {
  string method = 1;
  bytes payload = 2;
  int64 msg_id = 3;
  int32 msg_type = 4;
  int64 offset = 5;
  bool need_wrds_store = 6;
  int64 wrds_version = 7;
  string wrds_sub_key = 8;
}

message ChatMessage {
  User user = 2;
  string content = 3;
  bool visible_to_sender = 4;
}

message GiftMessage {
  User user = 7;
  int64 gift_id = 3;
  GiftStruct gift = 15;
  int64 combo_count = 9;
  string log_id = 1;
  int64 repeat_count = 6;
}

message GiftStruct {
  string name = 1;
  int64 diamond_count = 7;
}

message LikeMessage {
  User user = 5;
  int64 count = 1;
  int64 total = 2;
}

message MemberMessage {
  User user = 2;
  int64 member_count = 3;
  int32 action = 10;
}

message RoomUserSeqMessage {
  int64 total_user = 3;
  string total_user_str = 4;
  int64 total_pv_for_anchor = 5;
}

message SocialMessage {
  User user = 2;
  int64 action = 1;
}

message User {
  uint64 id = 1;
  uint64 short_id = 2;
  string nick_name = 3;
  uint32 gender = 4;
  string sec_uid = 9;
  uint32 level = 6;
  Image avatar_thumb = 21;
  string city = 36;
}

message Image {
  repeated string url_list = 1;
}

message PushFrame {
  uint64 seq_id = 1;
  uint64 log_id = 2;
  uint64 service = 3;
  uint64 method = 4;
  repeated HeadersList headers_list = 5;
  string payload_encoding = 6;
  string payload_type = 7;
  bytes payload = 8;
}

message HeadersList {
  string key = 1;
  string value = 2;
}
